<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Smart School Manager" />
    <title>Smart School Manager</title>
  </head>
  <body>
    <div id="root">
      <main style="min-height:100vh;display:grid;place-items:center;background:#f5f7fa;color:#17202a;font-family:Arial,sans-serif;padding:24px;">
        <section style="max-width:520px;width:100%;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:24px;box-shadow:0 10px 30px rgba(17,24,39,.08);">
          <h1 style="margin:0;font-size:24px;">Smart School Manager</h1>
          <p id="boot-status" style="margin:12px 0 0;color:#475569;font-size:14px;line-height:1.5;">Loading the sign in page...</p>
          <pre id="boot-error" style="display:none;margin:16px 0 0;white-space:pre-wrap;background:#0f172a;color:#fff;border-radius:8px;padding:12px;font-size:12px;line-height:1.5;"></pre>
          <noscript>
            <p style="margin:12px 0 0;color:#be123c;font-size:14px;">JavaScript is required to use this app.</p>
          </noscript>
        </section>
      </main>
    </div>
    <script>
      (function () {
        var status = document.getElementById('boot-status');
        var errorBox = document.getElementById('boot-error');
        function showError(message) {
          if (status) {
            status.textContent = 'The app JavaScript started but React did not mount.';
            status.style.color = '#be123c';
          }
          if (errorBox) {
            errorBox.style.display = 'block';
            errorBox.textContent = message;
          }
        }
        if (status) status.textContent = 'JavaScript is running. Loading the React app...';
        window.addEventListener('error', function (event) {
          showError((event.message || 'Script error') + (event.filename ? '\n' + event.filename + ':' + event.lineno + ':' + event.colno : ''));
        });
        window.addEventListener('unhandledrejection', function (event) {
          showError(event.reason && event.reason.stack ? event.reason.stack : String(event.reason || 'Unhandled promise rejection'));
        });
        window.setTimeout(function () {
          if (!document.documentElement.dataset.appMounted) {
            showError('No browser error was reported. Check that /assets/app.js is served with Content-Type: application/javascript and is not blocked by cache, browser extensions, or Hostinger static-file routing.');
          }
        }, 5000);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
